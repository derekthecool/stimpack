name: Test Neovim Configuration

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          mkdir -p $HOME/.nvim
          wget -q https://github.com/neovim/neovim/releases/latest/download/nvim-linux64.tar.gz
          tar -xzf nvim-linux64.tar.gz -C $HOME/.nvim --strip-components=1
          echo "$HOME/.nvim/bin" >> $GITHUB_PATH
          nvim --version

      - name: Install Neovim (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p $HOME/.nvim
          curl -sLO https://github.com/neovim/neovim/releases/latest/download/nvim-macos-x86_64.tar.gz
          tar -xzf nvim-macos-x86_64.tar.gz -C $HOME/.nvim --strip-components=1
          echo "$HOME/.nvim/bin" >> $GITHUB_PATH
          nvim --version

      - name: Install Neovim (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.nvim"
          $url = "https://github.com/neovim/neovim/releases/latest/download/nvim-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile nvim.zip -UseBasicParsing
          Expand-Archive -Path nvim.zip -DestinationPath "$env:USERPROFILE\.nvim" -Force
          "$env:USERPROFILE\.nvim\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          nvim --version

      - name: Test config loads
        run: nvim --headless +q

      - name: Test plugins install
        run: |
          nvim --headless +"Lazy! sync" +qa

      - name: Test LuaSnip loads
        run: |
          nvim --headless +"lua require('luasnip')" +q