name: Format Check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  format-check:
    name: Check Lua Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stylua
        run: |
          wget -qO- https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip -O stylua.zip
          unzip stylua.zip -d /tmp
          echo "/tmp" >> $GITHUB_PATH

      - name: Check formatting
        id: format-check
        run: |
          stylua --check lua/ 2>&1 || {
            echo "format_needed=true" >> $GITHUB_OUTPUT
            exit 1
          }
          echo "format_needed=false" >> $GITHUB_OUTPUT

      - name: Show formatting diff
        if: steps.format-check.outputs.format_needed == 'true'
        run: |
          echo "Lua files need formatting!"
          echo "Run 'stylua lua/' to fix"
          echo ""
          stylua lua/ --diff

      - name: Create summary
        if: always()
        run: |
          echo "## Formatting Check" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.format-check.outputs.format_needed }}" = "true" ]; then
            echo "❌ Formatting issues found. Run \`stylua lua/\` to fix." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All Lua files properly formatted" >> $GITHUB_STEP_SUMMARY
          fi
