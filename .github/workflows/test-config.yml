name: Test Neovim Configuration

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      run_full_tests:
        description: 'Run full test suite including snippets'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-config:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            nvim_asset: nvim-linux64
            nvim_path: /tmp/nvim-linux64/bin
          - os: windows-latest
            nvim_asset: nvim-win64
            nvim_path: $env:TEMP/nvim-win64/bin
          - os: macos-latest
            nvim_asset: nvim-macos-x86_64
            nvim_path: /tmp/nvim-macos/bin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Neovim
        shell: pwsh
        run: |
          $asset = "${{ matrix.nvim_asset }}"
          $baseUrl = "https://github.com/neovim/neovim/releases/latest/download"

          if ($IsLinux -or $IsMacOS) {
            $url = "$baseUrl/$asset.tar.gz"
            Invoke-WebRequest -Uri $url -OutFile nvim.tar.gz
            tar -xzf nvim.tar.gz -C /tmp
          } else {
            $url = "$baseUrl/$asset.zip"
            Invoke-WebRequest -Uri $url -OutFile nvim.zip
            Expand-Archive -Path nvim.zip -DestinationPath $env:TEMP
          }

          # Add to PATH
          $nvimPath = "${{ matrix.nvim_path }}"
          $nvimPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Added $nvimPath to PATH"

      - name: Install tree-sitter-cli
        shell: pwsh
        run: |
          if ($IsLinux) {
            sudo apt-get update -y
            sudo apt-get install -y tree-sitter-cli
          } elseif ($IsMacOS) {
            brew install tree-sitter
          } else {
            winget install --exact tree-sitter.cli
          }

      - name: Install stylua
        shell: pwsh
        run: |
          if ($IsLinux) {
            wget -qO- https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip -O stylua.zip
            unzip stylua.zip -d /tmp
            echo "/tmp" >> $env:GITHUB_PATH
          } elseif ($IsMacOS) {
            brew install stylua
          } else {
            winget install --exact JohnnyMorganz.StyLua
          }

      - name: Verify Neovim installation
        shell: pwsh
        run: |
          nvim --version

      - name: Test configuration loads
        shell: pwsh
        run: |
          $output = nvim --headless +q 2>&1
          $output | Out-File -FilePath load_test.log -Encoding utf8

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Configuration failed to load"
            Get-Content load_test.log
            exit 1
          }

          Write-Host "Configuration loaded successfully"

      - name: Run health checks
        shell: pwsh
        run: |
          $healthScript = @'
          vim.opt.loadplugins = false
          vim.opt.shadafile = "NONE"

          vim.schedule(function()
            local ok, result = pcall(vim.cmd, "checkhealth lazy")
            if not ok then
              print("Health check failed: " .. tostring(result))
            end
            vim.cmd("qa!")
          end)
          '@

          $healthScript | Out-File -FilePath health_check.lua -Encoding utf8
          nvim --headless -u health_check.lua +q 2>&1 | Out-File -FilePath health_check.log -Encoding utf8

          Write-Host "Health checks completed"

      - name: Test plugin installation
        shell: pwsh
        run: |
          $pluginScript = @'
          vim.opt.loadplugins = false
          vim.opt.shadafile = "NONE"

          vim.schedule(function()
            local ok, err = pcall(function()
              require("lazy").sync({ wait = true })
            end)
            if not ok then
              print("Plugin installation failed: " .. tostring(err))
            end
            vim.cmd("qa!")
          end)
          '@

          $pluginScript | Out-File -FilePath plugin_install.lua -Encoding utf8

          # Increase timeout for plugin installation
          $env:LAZY_INSTALL_TIMEOUT = 600
          nvim --headless -u plugin_install.lua +q 2>&1 | Out-File -FilePath plugin_install.log -Encoding utf8

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Plugin installation failed"
            Get-Content plugin_install.log
            exit 1
          }

          Write-Host "Plugins installed successfully"

      - name: Validate Lua syntax
        shell: pwsh
        run: |
          Get-ChildItem -Path lua -Recurse -Filter *.lua | ForEach-Object {
            Write-Host "Checking $($_.FullName)"
            $output = nvim --headless -c "luafile $($_.FullName)" -c "q" 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Syntax error in $($_.FullName)"
              Write-Host $output
              exit 1
            }
          }
          Write-Host "All Lua files have valid syntax"

      - name: Test LuaSnip snippets
        shell: pwsh
        run: |
          $snippetScript = @'
          vim.opt.loadplugins = false
          vim.opt.shadafile = "NONE"

          vim.schedule(function()
            -- Simply require luasnip - it will validate all snippets on load
            local ok, err = pcall(require, "luasnip")
            if not ok then
              print("Failed to load LuaSnip: " .. tostring(err))
              vim.cmd("cq!")
            end
            print("LuaSnip loaded successfully - snippets validated")
            vim.cmd("qa!")
          end)
          '@

          $snippetScript | Out-File -FilePath snippet_test.lua -Encoding utf8
          nvim --headless -u snippet_test.lua +q 2>&1 | Out-File -FilePath snippet_test.log -Encoding utf8

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Snippet validation failed"
            Get-Content snippet_test.log
            exit 1
          }

          Write-Host "LuaSnip snippets validated successfully"

      - name: Check formatting with stylua
        shell: pwsh
        run: |
          stylua --check lua/ 2>&1 | Out-File -FilePath format_check.log -Encoding utf8
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::Lua files need formatting. Run 'stylua lua/' to fix."
            Get-Content format_check.log
            stylua lua/ --diff
            exit 1
          }
          Write-Host "All Lua files properly formatted"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            load_test.log
            health_check.log
            plugin_install.log
            snippet_test.log
            format_check.log
          retention-days: 7

      - name: Create summary
        if: always()
        shell: pwsh
        run: |
          "## Test Summary for ${{ matrix.os }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          if (Test-Path load_test.log) {
            "### Config Load Test" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            Get-Content load_test.log | Select-Object -Last 20 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

          if (Test-Path plugin_install.log) {
            "### Plugin Installation" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            Get-Content plugin_install.log | Select-Object -Last 20 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

          if (Test-Path snippet_test.log) {
            "### Snippet Validation" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            Get-Content snippet_test.log | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
