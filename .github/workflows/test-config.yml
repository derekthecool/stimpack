name: Test Neovim Configuration

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim
          nvim --version

      - name: Install Neovim (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install neovim
          nvim --version

      - name: Install Neovim (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install --exact Neovim.Nvim
          nvim --version

      - name: Test config loads
        run: nvim --headless +q

      - name: Test plugins install
        run: |
          nvim --headless +"Lazy! sync" +qa

      - name: Test LuaSnip loads
        run: |
          nvim --headless +"lua require('luasnip')" +q