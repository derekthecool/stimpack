name: Plugin Update Automation

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not create PR)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      updates_available: ${{ steps.check.outputs.updates_available }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          wget -q https://github.com/neovim/neovim/releases/latest/download/nvim-linux64.tar.gz
          tar xzf nvim-linux64.tar.gz -C /tmp
          echo "/tmp/nvim-linux64/bin" >> $GITHUB_PATH

      - name: Check for updates
        id: check
        run: |
          nvim --headless +"Lazy! sync" +qa
          if git diff --quiet lazy-lock.json; then
            echo "updates_available=false" >> $GITHUB_OUTPUT
          else
            echo "updates_available=true" >> $GITHUB_OUTPUT
          fi

  test-updates:
    needs: check-updates
    if: needs.check-updates.outputs.updates_available == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/neovim/neovim/releases/latest/download/nvim-linux64.tar.gz
          tar xzf nvim-linux64.tar.gz -C /tmp
          echo "/tmp/nvim-linux64/bin" >> $GITHUB_PATH

      - name: Install Neovim (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sLO https://github.com/neovim/neovim/releases/latest/download/nvim-macos-x86_64.tar.gz
          tar xzf nvim-macos-x86_64.tar.gz -C /tmp
          echo "/tmp/nvim-macos/bin" >> $GITHUB_PATH

      - name: Install Neovim (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri "https://github.com/neovim/neovim/releases/latest/download/nvim-win64.zip" -OutFile nvim.zip -UseBasicParsing
          Expand-Archive -Path nvim.zip -DestinationPath $env:TEMP -Force
          "$env:TEMP\nvim-win64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Update plugins
        run: nvim --headless +"Lazy! sync" +qa

      - name: Test config
        run: nvim --headless +q

      - name: Upload lock file
        uses: actions/upload-artifact@v4
        with:
          name: lock-${{ matrix.os }}
          path: lazy-lock.json

  create-pr:
    needs: [check-updates, test-updates]
    if: needs.check-updates.outputs.updates_available == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download lock files
        uses: actions/download-artifact@v4
        with:
          pattern: lock-*
          merge-multiple: false

      - name: Verify lock files match
        run: |
          jq -S . lock-ubuntu-latest/lazy-lock.json > canonical.json
          jq -S . lock-macos-latest/lazy-lock.json | diff - canonical.json
          jq -S . lock-windows-latest/lazy-lock.json | diff - canonical.json
          cp lock-ubuntu-latest/lazy-lock.json ./lazy-lock.json

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: plugin-updates-$(date +%Y%m%d)
          title: "chore: update plugin dependencies $(date +%Y-%m-%d)"
          body: |
            Plugin updates tested on Ubuntu, macOS, and Windows.
            All platforms passed configuration tests.
          labels: dependencies